<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosangela Coelho Rodrigues</title>
    
    <!-- Importação da fonte Cormorant Garamond do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            font-family: 'Cormorant Garamond', 'Georgia', serif; 
            color: hsla(7.5, 78.87323944%, 72.15686275%, 1); 
            line-height: 1.6; 
        }
        
        /* Menu */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 5%; 
            background-color: #e3ede6; 
            position: relative;
            z-index: 10;
        }
        header a, header strong {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            text-decoration: none;
            color: hsla(7.5, 78.87323944%, 72.15686275%, 1);
        }
        .btn-rsvp { 
            background: #e9967a; 
            color: white !important; 
            padding: 8px 20px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: 600;
        }

        /* Container do Banner */
        .banner-container {
            width: 100%;
            position: relative; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e3ede6;
        }

        .banner-img {
            width: 100%;
            height: auto; 
            display: block;
        }

        /* Texto sobre o Banner (Desktop) */
        .banner-texto {
            position: absolute;
            text-align: center;
            color: hsla(7.5, 78.87323944%, 72.15686275%, 1);
            padding: 20px;
            top: 35%; 
            transform: translateY(-50%);
        }
        
        .banner-texto h1 { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5vw; 
            font-weight: 400; 
            margin: 0; 
            line-height: 1.1;
        }
        .banner-texto p { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8vw; 
            margin-top: 0px; 
            margin-bottom: 0;
        }
        
        /* Seções */
        .secao { padding: 80px 5%; text-align: center; }
        .bg-rosa { background-color: #fcece9; }
        .grid-duplo { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        
        .secao h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: hsla(7.5, 78.87323944%, 72.15686275%, 1);
        }
        .secao p {
            font-size: 1.2rem;
            color: hsla(7.5, 78.87323944%, 72.15686275%, 1);
        }

        /* Ajustes para Celular (Responsividade) */
        @media (max-width: 600px) {
            header { 
                flex-direction: column; 
                gap: 12px; 
                padding: 15px 5%;
                text-align: center;
            }
            
            .banner-container {
                flex-direction: column-reverse; 
                padding-top: 30px;
            }
            
            .banner-texto {
                position: relative;
                top: 0;
                transform: none;
                padding: 10px 20px 30px 20px;
                width: 100%;
                box-sizing: border-box;
            }

            .banner-texto h1 { font-size: 9vw; }
            .banner-texto p { font-size: 5vw; }

            /* NOVA ALTERAÇÃO: Força a Data e o Local a ficarem um embaixo do outro no celular */
            .grid-duplo {
                flex-direction: column;
                gap: 40px; /* Espaçamento vertical entre os blocos */
            }
            
            .secao {
                padding: 50px 5%; /* Ajuste fino do respiro da seção no celular */
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#local">Onde e quando</a>
        <strong>Rosangela Coelho Rodrigues</strong>
        <a href="#rsvp" class="btn-rsvp">RSVP</a>
    </header>

    <!-- Banner com Imagem e Texto tratado para mobile -->
    <section class="banner-container">
        <img src="banner.png" alt="Banner Rosangela" class="banner-img">
        <div class="banner-texto">
            <p>- 05/09/2026 -</p>
            <h1>Meus 60 anos!</h1>
            <p style="font-style: italic; margin-top: 15px;">Rosangela Coelho Rodrigues</p>
        </div>
    </section>

    <!-- Seção Data e Local -->
    <section class="secao bg-rosa" id="local">
        <div class="grid-duplo">
            <div>
                <h3>DATA</h3>
                <p>Sábado, 17 de junho de 2023</p>
            </div>
            <div>
                <h3>LOCAL</h3>
                <p>The Atelie Hotel</p>
            </div>
        </div>
    </section>

</body>
</html>
