<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosangela Coelho Rodrigues</title>
    <style>
        body { margin: 0; font-family: 'Georgia', serif; color: #b87b7b; line-height: 1.6; }
        
        /* Menu */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background-color: #e3ede6; 
        }
        .btn-rsvp { background: #e9967a; color: white; padding: 8px 20px; text-decoration: none; border-radius: 4px; }

        /* Container do Banner */
        .banner-container {
            width: 100%;
            position: relative; /* Necessário para posicionar o texto sobre a imagem */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-img {
            width: 100%;
            height: auto; /* Mantém a proporção real da sua imagem */
            display: block;
        }

        /* Texto sobre o Banner */
        .banner-texto {
            position: absolute;
            text-align: center;
            color: #b87b7b;
            padding: 20px;
        }
        
        .banner-texto h1 { font-size: 3.5vw; margin: 0; }
        .banner-texto p { font-size: 1.5vw; margin-top: 10px; }
        
        /* Ajustes para Celular */
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; }
            .banner-texto h1 { font-size: 6vw; }
            .banner-texto p { font-size: 3vw; }
        }

        /* Seções */
        .secao { padding: 80px 5%; text-align: center; }
        .bg-rosa { background-color: #fcece9; }
        .grid-duplo { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="#local">Onde e quando</a>
        <strong>Rosangela Coelho Rodrigues</strong>
        <a href="#rsvp" class="btn-rsvp">RSVP</a>
    </header>

    <!-- Banner com Imagem e Texto sobreposto -->
    <section class="banner-container">
        <img src="banner.png" alt="Banner Rosangela" class="banner-img">
        <div class="banner-texto">
            <h1>Rosangela Coelho Rodrigues</h1>
            <p>17.06.2023</p>
            <p>Meus 60 anos!</p>
        </div>
    </section>

    <!-- Seção Data e Local -->
    <section class="secao bg-rosa" id="local">
        <div class="grid-duplo">
            <div>
                <h3>DATA</h3>
                <p>Sábado, 17 de junho de 2023</p>
            </div>
            <div>
                <h3>LOCAL</h3>
                <p>The Atelie Hotel</p>
            </div>
        </div>
    </section>

</body>
</html>
